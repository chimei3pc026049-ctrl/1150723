<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>院區文件交換登記系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8; /* Light blue-gray background */
        }
        .card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .log-list::-webkit-scrollbar { width: 6px; }
        .log-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .log-list::-webkit-scrollbar-thumb { background: #aab8c2; border-radius: 10px; }
        .log-list::-webkit-scrollbar-thumb:hover { background: #8899a6; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="antialiased">
    <div class="container mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-800">院區文件交換登記系統</h1>
            <p class="text-slate-600 mt-2">請依序選擇日期與班次進行登記。</p>
            <div class="mt-6 max-w-md mx-auto flex items-center justify-center space-x-2">
                <input type="date" id="date-picker" class="w-full text-center p-2 border border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                <button onclick="clearAllLogsForToday()" class="p-2 bg-red-500 text-white rounded-md hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500" title="清空本日所有紀錄">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        </header>

        <main class="max-w-2xl mx-auto">
             <div class="mb-6">
                <label for="main-timeslot-select" class="block text-lg font-medium text-slate-700 mb-2">請選擇班次</label>
                <select id="main-timeslot-select" class="block w-full p-3 text-base border-slate-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 rounded-md shadow-sm">
                    <!-- Options populated by JS -->
                </select>
            </div>
            <div id="card-container">
                 <div class="text-center p-8 bg-white rounded-xl shadow-md">
                    <p class="text-slate-500">選擇班次後，將會在此顯示登記介面。</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- DATA ---
        const timeSlots = [
            { id: '0815', time: '08:15', route: '佳里 → 總院', primaryAction: '寄件' },
            { id: '1015', time: '10:15', route: '總院 → 佳里', primaryAction: '收件' },
            { id: '1215', time: '12:15', route: '佳里 → 總院', primaryAction: '寄件' },
            { id: '1300', time: '13:00', route: '佳里 → 柳營', primaryAction: '寄件' },
            { id: '1320', time: '13:20', route: '柳營 → 佳里', primaryAction: '收件' },
            { id: '1415', time: '14:15', route: '總院 → 佳里', primaryAction: '收件' },
            { id: '1505', time: '15:05', route: '佳里 → 總院', primaryAction: '寄件' },
        ];
        const departments = Array.from({ length: 40 }, (_, i) => `單位 ${String(i + 1).padStart(2, '0')}`);

        // Main data store
        let allLogs = {};
        let currentDate;

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            const mainSelect = document.getElementById('main-timeslot-select');
            mainSelect.innerHTML = '<option value="">請選擇班次...</option>';
            timeSlots.forEach(slot => {
                const option = new Option(`${slot.time} ${slot.route}`, slot.id);
                mainSelect.appendChild(option);
            });
            mainSelect.addEventListener('change', displaySelectedCard);

            const datePicker = document.getElementById('date-picker');
            datePicker.value = getFormattedDate(new Date());
            datePicker.addEventListener('change', handleDateChange);
            
            loadAllLogsFromStorage();
            handleDateChange(); 
        });

        // --- UI RENDERING ---
        function displaySelectedCard() {
            const mainSelect = document.getElementById('main-timeslot-select');
            const cardContainer = document.getElementById('card-container');
            const slotId = mainSelect.value;

            if (!slotId) {
                cardContainer.innerHTML = `
                    <div class="text-center p-8 bg-white rounded-xl shadow-md">
                        <p class="text-slate-500">選擇班次後，將會在此顯示登記介面。</p>
                    </div>`;
                return;
            }

            const selectedSlot = timeSlots.find(s => s.id === slotId);
            cardContainer.innerHTML = createCardHTML(selectedSlot);
            
            populateDropdown(slotId);
            renderLogs(slotId);
            updateStatistics(slotId);
        }

        // --- HTML TEMPLATES ---
        function createCardHTML(slot) {
            const isSendPrimary = slot.primaryAction === '寄件';
            const btnClass = isSendPrimary ? 'bg-blue-600 hover:bg-blue-700 focus:ring-blue-500 text-white' : 'bg-green-600 hover:bg-green-700 focus:ring-green-500 text-white';

            return `
                <div id="card-${slot.id}" class="card bg-white rounded-xl shadow-md overflow-hidden flex flex-col">
                    <div class="p-5 flex-grow">
                        <div class="space-y-4">
                             <div class="grid grid-cols-3 gap-3">
                                <div class="col-span-2">
                                    <label for="department-select-${slot.id}" class="text-sm font-medium text-slate-700">選擇單位</label>
                                    <select id="department-select-${slot.id}" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-slate-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md shadow-sm"></select>
                                </div>
                                <div>
                                    <label for="quantity-${slot.id}" class="text-sm font-medium text-slate-700">數量</label>
                                    <input type="number" id="quantity-${slot.id}" value="1" min="1" class="mt-1 block w-full pl-3 pr-2 py-2 text-base border-slate-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md shadow-sm">
                                </div>
                            </div>
                            <div>
                                <button onclick="addLog('${slot.id}', '${slot.primaryAction}')" class="w-full flex justify-center items-center px-4 py-2.5 border border-transparent text-base font-medium rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 ${btnClass}">
                                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    登記 ${slot.primaryAction}
                                </button>
                            </div>
                        </div>
                        <div class="mt-6">
                            <h3 class="text-lg font-medium text-slate-800 border-b pb-2">已登記列表</h3>
                            <div id="log-list-${slot.id}" class="log-list mt-3 space-y-2 pr-2 max-h-60 overflow-y-auto"></div>
                        </div>
                    </div>
                    <div id="stats-${slot.id}" class="p-4 bg-slate-100 text-sm font-medium text-slate-700 border-t">
                        <!-- Stats will be rendered here -->
                    </div>
                </div>`;
        }

        function createLogItemHTML(log) {
            const actionClass = log.action === '寄件' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800';
            const actionBorder = log.action === '寄件' ? 'border-blue-500' : 'border-green-500';
            return `
                <div class="flex items-center justify-between p-3 bg-slate-50 rounded-md border-l-4 ${actionBorder}">
                    <span class="font-medium text-slate-700 flex-1">${log.department}</span>
                    <div class="flex items-center space-x-3">
                         <span class="font-semibold text-slate-800 text-sm">${log.quantity} 件</span>
                        <span class="text-xs font-semibold px-2.5 py-0.5 rounded-full ${actionClass}">${log.action}</span>
                        <button onclick="deleteLog('${log.timeSlot}', ${log.id})" class="text-slate-400 hover:text-red-600 focus:outline-none">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>`;
        }

        // --- LOGIC ---
        function populateDropdown(slotId) {
            const select = document.getElementById(`department-select-${slotId}`);
            select.innerHTML = '<option value="" disabled selected>請選擇單位...</option>';
            departments.forEach(dept => {
                select.add(new Option(dept, dept));
            });
        }

        function addLog(slotId, action) {
            const select = document.getElementById(`department-select-${slotId}`);
            const quantityInput = document.getElementById(`quantity-${slot.id}`);
            const department = select.value;
            const quantity = parseInt(quantityInput.value, 10);

            if (!department || !quantity || quantity < 1) {
                const card = document.getElementById(`card-${slotId}`);
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
                return;
            }

            const newLog = { id: Date.now(), timeSlot: slotId, department, action, quantity };
            allLogs[currentDate][slotId].push(newLog);
            allLogs[currentDate][slotId].sort((a,b) => a.department.localeCompare(b.department));

            renderLogs(slotId);
            updateStatistics(slotId);
            saveAllLogsToStorage();
            
            select.value = "";
            quantityInput.value = "1";
        }

        function deleteLog(slotId, logId) {
            allLogs[currentDate][slotId] = allLogs[currentDate][slotId].filter(log => log.id !== logId);
            renderLogs(slotId);
            updateStatistics(slotId);
            saveAllLogsToStorage();
        }
        
        function clearAllLogsForToday() {
            if (confirm(`您確定要刪除 ${currentDate} 的所有登記紀錄嗎？此操作無法復原。`)) {
                initializeLogsForDate(currentDate);
                displaySelectedCard(); 
                saveAllLogsToStorage();
            }
        }
        
        function updateStatistics(slotId) {
            const statsContainer = document.getElementById(`stats-${slotId}`);
            const logsForSlot = allLogs[currentDate]?.[slotId] || [];
            
            const totalSent = logsForSlot.filter(l => l.action === '寄件').reduce((sum, l) => sum + l.quantity, 0);
            const totalReceived = logsForSlot.filter(l => l.action === '收件').reduce((sum, l) => sum + l.quantity, 0);

            statsContainer.innerHTML = `
                <div class="flex justify-between items-center">
                    <span>總寄件: <strong class="text-blue-600">${totalSent}</strong> 件</span>
                    <span>總收件: <strong class="text-green-600">${totalReceived}</strong> 件</span>
                </div>`;
        }

        function renderLogs(slotId) {
            const logList = document.getElementById(`log-list-${slotId}`);
            const logsForSlot = allLogs[currentDate]?.[slotId] || [];
            if (logsForSlot.length === 0) {
                logList.innerHTML = '<p class="text-center text-sm text-slate-500 py-4">目前無登記紀錄</p>';
            } else {
                logList.innerHTML = logsForSlot.map(createLogItemHTML).join('');
            }
        }
        
        // --- DATE & STORAGE ---
        function handleDateChange() {
            currentDate = document.getElementById('date-picker').value;
            if (!allLogs[currentDate]) {
                initializeLogsForDate(currentDate);
            }
            displaySelectedCard();
        }

        function initializeLogsForDate(date) {
            allLogs[date] = {};
            timeSlots.forEach(slot => {
                allLogs[date][slot.id] = [];
            });
        }

        function saveAllLogsToStorage() {
            localStorage.setItem('documentExchangeLogs', JSON.stringify(allLogs));
        }

        function loadAllLogsFromStorage() {
            const savedLogs = localStorage.getItem('documentExchangeLogs');
            allLogs = savedLogs ? JSON.parse(savedLogs) : {};
        }

        function getFormattedDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
    </script>
</body>
</html>
